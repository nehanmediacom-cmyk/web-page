<!DOCTYPE html>
<html>
<head>
    <title>My Creative Web Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 20px;
        }

        h1 {
            text-align: center;
            color: darkblue;
        }

        .box {
            background-color: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px lightgray;
        }

        img {
            display: block;
            margin: 10px auto;
            border-radius: 10px;
        }

        button {
            background-color: darkblue;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: green;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: lightblue;
        }

        footer {
            text-align: center;
            color: gray;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>Welcome to My Website</h1>

    <div class="box">
        <h2>My Profile Image</h2>
        <img src="images.png/image.png" width="200" alt="My Image">
        <p>This is my profile picture added to the webpage.</p>
    </div>

    <div class="box">
        <h2>My Skills</h2>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>
    </div>

    <div class="box">
        <h2>Simple Form</h2>
        <form>
            <label>Name:</label><br>
            <input type="text" placeholder="Enter your name"><br><br>

            <label>Email:</label><br>
            <input type="email" placeholder="Enter your email"><br><br>

            <button type="submit">Submit</button>
        </form>
    </div>

    <div class="box">
        <h2>Student Table</h2>
        <table border="1">
            <tr>
                <th>Name</th>
                <th>Course</th>
            </tr>
            <tr>
                <td>Rahul</td>
                <td>BCA</td>
            </tr>
            <tr>
                <td>Anita</td>
                <td>BA</td>
            </tr>
        </table>
    </div>

    <footer>
        © 2026 My Website | All Rights Reserved
    </footer>

</body>
</html>
